name: Build qc_inspect

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-linux-x64:
    name: Linux x64
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build
        run: |
          pyinstaller --onefile --name qc_inspect_linux_x64 qc_inspect.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: qc_inspect_linux_x64
          path: dist/qc_inspect_linux_x64

  build-windows-x64:
    name: Windows x64
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          architecture: x64

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build
        run: |
          pyinstaller --onefile --name qc_inspect_windows_x64 qc_inspect.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: qc_inspect_windows_x64
          path: dist\qc_inspect_windows_x64.exe

  build-windows-arm64:
    name: Windows arm64
    runs-on: windows-11-arm
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build
        run: |
          pyinstaller --onefile --name qc_inspect_windows_arm64 qc_inspect.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: qc_inspect_windows_arm64
          path: dist\qc_inspect_windows_arm64.exe

  build-macos-arm64:
    name: macOS arm64
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build
        run: |
          pyinstaller --onefile --name qc_inspect_macos_arm64 qc_inspect.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: qc_inspect_macos_arm64
          path: dist/qc_inspect_macos_arm64

  release:
    name: Create Release
    needs:
      - build-linux-x64
      - build-windows-x64
      - build-windows-arm64
      - build-macos-arm64
    runs-on: ubuntu-22.04
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: List files
        run: find dist/ -type f

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/qc_inspect_linux_x64/qc_inspect_linux_x64
            dist/qc_inspect_windows_x64/qc_inspect_windows_x64.exe
            dist/qc_inspect_windows_arm64/qc_inspect_windows_arm64.exe
            dist/qc_inspect_macos_arm64/qc_inspect_macos_arm64
          generate_release_notes: true
